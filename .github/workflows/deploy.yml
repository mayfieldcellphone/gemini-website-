name: Deploy to FTP




on:
  push:
    branches:
      - main




jobs:
  deploy:
    runs-on: ubuntu-latest




    steps:
    - name: Checkout code
      uses: actions/checkout@v4




    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'




    - name: Install dependencies
      run: npm install




    - name: Build project
      run: npm run build




