name: Deploy to FTP


on:
  push:
    branches:
      - main


jobs:
  deploy:
    runs-on: ubuntu-latest


    steps:
    - name: Checkout code
      uses: actions/checkout@v2


    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'


    - name: Install dependencies
      run: npm install


    - name: Build project
      run: npm run build


    - name: Deploy to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ftp.mayfieldcellphonerepairs.com.au
        username: u479262663.githubdeploy
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        local-dir: dist/
        server-dir: public_html/
