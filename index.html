    <script>
      window.log = console.log;
      // Protect window.fetch from being overwritten by polyfills that might crash
      // if it's already a getter-only property in certain environments.
      (function() {
        var originalFetch = window.fetch;
        if (typeof originalFetch === 'function') {
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { console.warn('Fetch overwrite blocked'); },
              configurable: true
            });
          } catch (e) {}
        }
      })();
    </script>

    <div id="root"></div>
    <script type="text/javascript" charset="utf-8">
      // Suppress noisy SignalR/WebSocket errors that are common in preview/proxy environments
      (function() {
        const originalError = console.error;
        const originalWarn = console.warn;
        const filterPatterns = [
          'SignalR',
          'WebSocket failed to connect',
          'Connection disconnected',
          'ping within the configured ClientTimeoutInterval',
          'no reason given',
          'HttpConnection before stop()',
          'failed to start the connection',
          'connection ID is not present on the server',
          'sticky sessions are enabled',
          'failed to start the HttpConnection'
        ];

        const shouldFilter = (args) => {
          const msg = Array.from(args).map(arg => {
            if (arg instanceof Error) return arg.message;
            if (typeof arg === 'object') return JSON.stringify(arg);
            return String(arg);
          }).join(' ');
          return filterPatterns.some(pattern => msg.toLowerCase().includes(pattern.toLowerCase()));
        };

        console.error = function() {
          if (shouldFilter(arguments)) {
            // Silently log to a hidden debug array for developers if needed
            if (!window.__suppressed_errors) window.__suppressed_errors = [];
            window.__suppressed_errors.push({ type: 'error', args: Array.from(arguments), time: Date.now() });
            return;
          }
          originalError.apply(console, arguments);
        };

        console.warn = function() {
          if (shouldFilter(arguments)) return;
          originalWarn.apply(console, arguments);
        };
        
        // Also catch global unhandled promise rejections which SignalR often triggers
        window.addEventListener('unhandledrejection', function(event) {
          const reason = event.reason || '';
          const msg = (reason.message || String(reason)).toLowerCase();
          if (filterPatterns.some(pattern => msg.includes(pattern.toLowerCase()))) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        }, true);

        // Catch and suppress generic cross-origin "Script error." from 3rd-party scripts
        window.onerror = function(msg, url, line, col, error) {
          const errorMsg = String(msg || '').toLowerCase();
          if (errorMsg.includes('script error') || !url || url.indexOf(window.location.host) === -1) {
            // Suppress cross-origin script errors completely
            return true;
          }
        };

        window.addEventListener('error', function(event) {
          const errorMsg = (event.message || '').toLowerCase();
          if (errorMsg.includes('script error') || !event.filename || event.filename === '') {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        }, true);
      })();

      window.addEventListener('DOMContentLoaded', () => {
        // Initial setup hook
      });
    </script>
